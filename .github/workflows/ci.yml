name: Machine Learning Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run MLProject Continuous Retraining
      run: |
        mlflow run ./MLProject --env-manager=local

    - name: Save Newly Generated mlruns to GitHub Repository
      run: |
        git config --global user.name "zakyrmh"
        git config --global user.email "zakyramadhan@example.com"
        
        git add MLProject/mlruns/ || git add mlruns/
        
        git commit -m "Automated save mlruns from GitHub CI run [skip ci]" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref_name }}