name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CSV_URL: "MLProject/namadataset_preprocessing/data_clean.csv"

jobs:
  build-and-retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Check Env
      run: |
        echo "Target path: $CSV_URL"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run mlflow project
      run: |
        mlflow run ./MLProject --env-manager=local

    - name: Get latest MLflow run_id
      run: |
        # Filter ketat menggunakan regex: hanya mengambil nama folder yang berisi 32 karakter hexadecimal (Run ID asli MLflow)
        LATEST_RUN=$(ls -t MLProject/mlruns/0 | grep -E '^[0-9a-f]{32}$' | head -n 1)
        echo "LATEST_RUN_ID=$LATEST_RUN" >> $GITHUB_ENV
        echo "Mendapatkan Run ID Terbaru: $LATEST_RUN"

    - name: Install Python dependencies
      run: |
        pip install --upgrade google-auth google-auth-oauthlib google-api-python-client google-auth-httplib2

    - name: Upload to Google Drive
      env:
        GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        LATEST_RUN_ID: ${{ env.LATEST_RUN_ID }}
      run: |
        python MLProject/upload_to_gdrive.py

    - name: Build Docker Model
      run: |
        if [ ! -f Dockerfile ]; then
          echo -e "FROM python:3.12-slim\nWORKDIR /app\nCOPY . /app" > Dockerfile
        fi
        # Menggunakan pengaman fallback: jika rahasia kosong, default ke nama user 'zakyrmh' agar build tidak crash
        DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"
        if [ -z "$DOCKER_USER" ]; then DOCKER_USER="zakyrmh"; fi
        
        docker build -t ${DOCKER_USER}/chemical-solubility-service:latest .
        echo "DOCKER_FINAL_USER=${DOCKER_USER}" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_FINAL_USER }}/chemical-solubility-service:latest ${{ env.DOCKER_FINAL_USER }}/chemical-solubility-service:${{ env.LATEST_RUN_ID }}

    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_FINAL_USER }}/chemical-solubility-service:latest
        docker push ${{ env.DOCKER_FINAL_USER }}/chemical-solubility-service:${{ env.LATEST_RUN_ID }}